<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道設計技士 学習アプリ</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { color: #2c3e50; text-align: center; }
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
        
        .question-card {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .question-id { font-size: 0.9em; color: #7f8c8d; margin-bottom: 10px; }
        .question-text { font-size: 1.1em; font-weight: bold; white-space: pre-wrap; }
        
        /* 画像表示エリアのスタイル */
        .image-area img {
            max-width: 100%;
            height: auto;
            margin-top: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .actions { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            color: #fff;
        }
        .btn-show { background-color: #e67e22; }
        .btn-show:hover { background-color: #d35400; }
        .btn-nav { background-color: #3498db; }
        .btn-nav:hover { background-color: #2980b9; }
        .btn-skip { background-color: #95a5a6; }
        .btn-skip:hover { background-color: #7f8c8d; }

        .explanation-card {
            background: #e8f4f8;
            padding: 25px;
            border-radius: 10px;
            border-left: 5px solid #3498db;
            display: none; /* 初期状態は非表示 */
        }
        .answer-box {
            background: #fff;
            padding: 15px;
            border-radius: 5px;
            border: 1px dashed #e67e22;
            margin-bottom: 20px;
        }
        .answer-box h4 { margin-top: 0; color: #e67e22; }
        .status-text { text-align: center; color: #7f8c8d; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>鉄道設計技士 試験対策アプリ</h1>

    <div class="controls">
        <select id="modeSelect" onchange="loadQuestions()">
            <option value="択一式">専門Ⅱ（過去問・択一式）</option>
            <!-- ここで記述式・想定問題を選択できるように追加 -->
            <option value="記述式">記述式・想定問題</option>
        </select>
    </div>

    <div class="status-text" id="statusText">問題を読み込んでいます...</div>

    <div class="question-card">
        <div class="question-id" id="questionId"></div>
        <div class="question-text" id="questionText"></div>
        <!-- 画像表示用のエリア -->
        <div class="image-area" id="questionImageArea"></div>
    </div>

    <div class="actions">
        <button class="btn-nav" onclick="prevQuestion()">◀ 前へ</button>
        <button class="btn-show" onclick="showExplanation()">解答・解説を見る</button>
        <button class="btn-skip" onclick="skipQuestion()">スキップ</button>
        <button class="btn-nav" onclick="nextQuestion()">次へ ▶</button>
    </div>

    <div class="explanation-card" id="explanationCard">
        <div class="answer-box">
            <h4>模範解答</h4>
            <div id="correctAnswerText" style="white-space: pre-wrap;"></div>
        </div>
        <h4>解説・ポイント</h4>
        <div id="explanationContent"></div>
    </div>

    <script>
        let currentQuestions = [];
        let currentIndex = 0;

        // 問題データをJSONファイルから読み込む
        async function loadQuestions() {
            const mode = document.getElementById("modeSelect").value;
            let jsonPath = "";

            // プルダウンの選択によって読み込むファイルを切り替え
            if (mode === "記述式") {
                jsonPath = "output_v2/exams/記述式・想定問題/qa_database_descriptive.json";
            } else {
                // 既存の択一式データのパス（環境に合わせてください）
                jsonPath = "output_v2/exams/qa_database.json"; 
            }

            try {
                const response = await fetch(jsonPath);
                if (!response.ok) throw new Error("JSONファイルの読み込みに失敗しました。");
                
                currentQuestions = await response.json();
                currentIndex = 0;
                
                if(currentQuestions.length > 0){
                    displayQuestion();
                } else {
                    document.getElementById("questionText").innerText = "問題データが空です。";
                }
            } catch (error) {
                console.error(error);
                document.getElementById("questionText").innerText = "データの読み込みエラー: " + jsonPath + " が見つかりません。\nPythonスクリプトを実行してJSONを生成してください。";
                document.getElementById("statusText").innerText = "エラーが発生しました";
                currentQuestions = [];
            }
        }

        // 画面に問題を表示する
        function displayQuestion() {
            if (currentQuestions.length === 0) return;

            const q = currentQuestions[currentIndex];
            
            // 進捗表示
            document.getElementById("statusText").innerText = `問題 ${currentIndex + 1} / ${currentQuestions.length}`;
            
            // 問題テキスト
            document.getElementById("questionId").innerText = "ID: " + (q.id || "不明");
            document.getElementById("questionText").innerText = q.question_text || q.question; // 記述式・択一式両方のキーに対応

            // 画像の表示処理
            const imageArea = document.getElementById("questionImageArea");
            if (q.image_file && q.image_file.trim() !== "") {
                // 画像がある場合（※画像フォルダのパスは適宜合わせてください）
                imageArea.innerHTML = `<img src="images/${q.image_file}" alt="問題画像">`;
            } else {
                // 画像がない場合は空にする
                imageArea.innerHTML = "";
            }

            // 解説エリアを隠す
            document.getElementById("explanationCard").style.display = "none";
        }

        // 解答・解説を表示する
        function showExplanation() {
            if (currentQuestions.length === 0) return;
            const q = currentQuestions[currentIndex];
            
            document.getElementById("correctAnswerText").innerText = q.correct_answer || "解答データなし";
            
            // マークダウン形式の解説をHTMLに変換して表示（marked.jsを使用）
            const expText = q.explanation_text || q.explanation || "解説データなし";
            document.getElementById("explanationContent").innerHTML = marked.parse(expText);
            
            document.getElementById("explanationCard").style.display = "block";
        }

        // 次の問題へ
        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                displayQuestion();
            } else {
                alert("最後の問題です。");
            }
        }

        // 前の問題へ
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                displayQuestion();
            }
        }

        // スキップ（内部処理的には「次へ」と同じだが、将来的に正答率集計を入れないためのボタン）
        function skipQuestion() {
            nextQuestion();
        }

        // ページ読み込み時に最初のデータをロード
        window.onload = loadQuestions;
    </script>
</body>
</html>
